name: docker-tls

services:

  certbot:
    # Let's Encrypt Certbot service for TLS cert management.
    # This image configures and manages the files
    image: certbot/certbot:latest
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:rw
      - /srv/docker/certbot/www:/var/www/certbot:rw
    # YAML Literal block scalar (|) to split command to multiple lines
    entrypoint: /bin/sh -c
    command: |
      trap exit TERM
      while :; do
        certbot renew --webroot -w /var/www/certbot --quiet
        sleep 24h & wait $${!}
      done

  nginx:
    # Nginx web server as proxy. 
    image: nginx:alpine
    environment:
      - DOMAIN=${DOMAIN:?DOMAIN env variable must be set}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Overlapping mounts are not allowed, so mount parts individually
      - /srv/docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - /srv/docker/nginx/conf.d:/etc/nginx/conf.d
      - /srv/docker/nginx/snippets:/etc/nginx/snippets
      # - /etc/letsencrypt/live/${DOMAIN}:/etc/nginx/certs
      # Mount full LetsEncrypt tree so certificate symlinks will work
      - /etc/letsencrypt:/etc/letsencrypt:ro
      # Web content
      - /srv/docker/www:/usr/share/nginx/html:ro
      - /srv/docker/certbot/www:/usr/share/nginx/certbot:ro
    command: /bin/sh -c "ln -s /etc/letsencrypt/live/${DOMAIN} /etc/nginx/certs && ls -lR /etc/nginx && nginx -g 'daemon off;'"

  dozzle:
    # Log visualizer
    image: amir20/dozzle:latest
    #container_name: log-viewer
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro # read-only access to Docker
    ports:
      - "8888:8080"
    environment:
      - DOZZLE_LEVEL=info
 
volumes:
  certbot-www:
