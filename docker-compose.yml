name: docker-tls

services:

  certbot:
    # Let's Encrypt Certbot service for TLS cert management.
    # This image configures and manages the files
    image: certbot/certbot:latest
    volumes:
      - /srv/docker/certbot/conf:/etc/letsencrypt:rw
      - /srv/docker/certbot/www:/var/www/certbot:rw
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 24h & wait $${!}; done;'"

  nginx:
    # Nginx web server as proxy. 
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443" # Reserved for HTTPS, not yet configured in nginx.
    volumes:
      - /srv/docker/nginx/conf:/etc/nginx:ro
      - /srv/docker/nginx/html:/usr/share/nginx/html:ro
      - /srv/docker/certbot/www:/usr/share/nginx/certbot:ro
      - /srv/docker/certbot/conf:/etc/letsencrypt:ro

  dozzle:
    # Log visualizer
    image: amir20/dozzle:latest
    #container_name: log-viewer
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro # read-only access to Docker
    ports:
      - "8888:8080"
    environment:
      - DOZZLE_LEVEL=info
 
